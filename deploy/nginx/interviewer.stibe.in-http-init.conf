# Temporary HTTP-only vhost for initial certbot verification (webroot).
# Once the SSL cert is verified, Nginx config should be replaced with interviewer.stibe.in.conf.
server {
    listen 80;
    server_name interviewer.stibe.in company.interviewer.stibe.in api.interviewer.stibe.in;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
