# Production HTTPS Nginx configuration for interviewer stack
# Ports: Job Seeker = 3040, Company = 3041, API = 8040

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name interviewer.stibe.in company.interviewer.stibe.in api.interviewer.stibe.in;
    return 301 https://$host$request_uri;
}

# 1. Job Seeker Frontend (interviewer.stibe.in)
server {
    listen 127.0.0.1:8443 ssl;
    server_name interviewer.stibe.in;

    ssl_certificate /etc/letsencrypt/live/interviewer.stibe.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/interviewer.stibe.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# 2. Company/Employer Frontend (company.interviewer.stibe.in)
